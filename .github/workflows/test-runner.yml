name: Test Runner Connection

on:
  issues:
    types: [labeled]

jobs:
  test-job:
    if: github.event.label.name == 'test-runner'
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Show environment info
        shell: pwsh
        run: |
          Write-Host "=== Runner Environment ==="
          Write-Host "Runner name: ${{ runner.name }}"
          Write-Host "OS: ${{ runner.os }}"
          whoami
          hostname
      
      - name: List files
        shell: pwsh
        run: |
          Write-Host "=== Repository Files ==="
          Get-ChildItem -Force
          Write-Host "=== README Content ==="
          Get-Content README.md
      
      - name: Test complete
        shell: pwsh
        run: |
          Write-Host "=== TEST PASSED ==="
          Write-Host "Issue number: ${{ github.event.issue.number }}"
          Write-Host "Issue title: ${{ github.event.issue.title }}"
