name: Kimi Task Executor

on:
  issues:
    types: [labeled]

jobs:
  execute:
    if: github.event.label.name == 'status:ready'
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Save task to file
        shell: powershell
        run: |
          $issueTitle = "${{ github.event.issue.title }}"
          $issueBody = "${{ github.event.issue.body }}"
          $taskContent = "# Task: $issueTitle`n`n$issueBody"
          $taskContent | Out-File -Encoding UTF8 task.md
          Write-Host "Task saved to task.md"
      
      - name: Execute kimi-cli
        shell: powershell
        run: |
          Write-Host "=== Starting kimi-cli ==="
          if (Get-Command kimi -ErrorAction SilentlyContinue) {
            Write-Host "kimi-cli found, executing..."
            kimi --input task.md --output result/ 2>&1 | Tee-Object -FilePath execution.log
          } else {
            Write-Host "kimi-cli not found in PATH"
            exit 1
          }
      
      - name: Commit results
        shell: powershell
        run: |
          git config user.name "kimi-bot"
          git config user.email "bot@kimi.ai"
          git add -A
          git commit -m "kimi: Execute task #${{ github.event.issue.number }} - ${{ github.event.issue.title }}"
          git push
      
      - name: Report completion
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ **作業完了！**` +
                `\n\nkimi-cliがタスクを実行しました。` +
                `\n- Issue: #${context.issue.number}` +
                `\n- タイトル: ${context.payload.issue.title}` +
                `\n\n結果はリポジトリにコミットされています。`
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['status:completed']
            });
