name: Kimi Task Executor

on:
  issues:
    types: [labeled]

jobs:
  execute:
    if: github.event.label.name == 'status:ready'
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Debug environment
        shell: powershell
        run: |
          Write-Host "=== Environment Debug ==="
          Write-Host "PATH: $env:PATH"
          Write-Host "Whoami: $env:USERNAME"
          $kimiPath = Get-Command kimi -ErrorAction SilentlyContinue
          if ($kimiPath) {
            Write-Host "kimi found at: $($kimiPath.Source)"
          } else {
            Write-Host "kimi NOT found in PATH"
            # 一般的なインストール場所を探す
            $commonPaths = @(
              "$env:USERPROFILE\.local\bin\kimi.exe",
              "$env:APPDATA\Python\Python313\Scripts\kimi.exe",
              "C:\Python313\Scripts\kimi.exe",
              "$env:LOCALAPPDATA\Programs\Python\Python313\Scripts\kimi.exe"
            )
            foreach ($p in $commonPaths) {
              if (Test-Path $p) {
                Write-Host "Found kimi at: $p"
              }
            }
          }
      
      - name: Save task to file
        shell: powershell
        run: |
          $issueTitle = "${{ github.event.issue.title }}"
          $issueBody = "${{ github.event.issue.body }}"
          "# Task: $issueTitle`n`n$issueBody" | Out-File -Encoding UTF8 task.md
          Write-Host "Task saved"
          Get-Content task.md
      
      - name: Execute kimi-cli
        shell: powershell
        run: |
          Write-Host "=== Starting kimi-cli ==="
          # フルパスで探す
          $kimiCmd = Get-Command kimi -ErrorAction SilentlyContinue
          if (-not $kimiCmd) {
            # pip install された場合の一般的な場所
            $possiblePaths = @(
              "$env:USERPROFILE\.local\bin\kimi.exe",
              "$env:APPDATA\Python\Python313\Scripts\kimi.exe",
              "C:\Python313\Scripts\kimi.exe",
              "$env:LOCALAPPDATA\Programs\Python\Python313\Scripts\kimi.exe"
            )
            foreach ($p in $possiblePaths) {
              if (Test-Path $p) {
                $kimiCmd = $p
                break
              }
            }
          }
          
          if ($kimiCmd) {
            Write-Host "Using kimi: $kimiCmd"
            & $kimiCmd --input task.md --output result/ 2>&1 | Tee-Object -FilePath execution.log
          } else {
            Write-Host "ERROR: kimi-cli not found. Please ensure it's installed and in PATH."
            exit 1
          }
      
      - name: Commit results
        shell: powershell
        run: |
          git config user.name "kimi-bot"
          git config user.email "bot@kimi.ai"
          git add -A
          git commit -m "kimi: Execute task #${{ github.event.issue.number }}" || Write-Host "Nothing to commit"
          git push
      
      - name: Report completion
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ job.status }}';
            const msg = result === 'success' 
              ? '✅ **作業完了！**' 
              : '❌ **作業失敗**\\n\\nエラーログを確認してください。';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });
