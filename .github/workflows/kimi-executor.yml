name: Kimi Task Executor

on:
  issues:
    types: [labeled]

jobs:
  execute:
    if: github.event.label.name == 'status:ready'
    runs-on: self-hosted
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Debug environment
        shell: powershell
        run: |
          "=== Environment Debug ===" | Out-File debug.log
          "Current directory: $(Get-Location)" | Tee-Object -FilePath debug.log -Append
          "Whoami: $env:USERNAME" | Tee-Object -FilePath debug.log -Append
          $kimiPath = Get-Command kimi -ErrorAction SilentlyContinue
          if ($kimiPath) {
            "kimi found at: $($kimiPath.Source)" | Tee-Object -FilePath debug.log -Append
          } else {
            "kimi NOT found in PATH" | Tee-Object -FilePath debug.log -Append
            $commonPaths = @(
              "$env:USERPROFILE\.local\bin\kimi.exe",
              "$env:APPDATA\Python\Python313\Scripts\kimi.exe",
              "C:\Python313\Scripts\kimi.exe",
              "$env:LOCALAPPDATA\Programs\Python\Python313\Scripts\kimi.exe",
              "C:\Users\owner\AppData\Local\Programs\Python\Python313\Scripts\kimi.exe"
            )
            foreach ($p in $commonPaths) {
              if (Test-Path $p) {
                "Found kimi at: $p" | Tee-Object -FilePath debug.log -Append
              }
            }
          }
          Get-Content debug.log
          "========================" | Out-File -Append debug.log
      
      - name: Save task to file
        shell: powershell
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          "=== Save task step started ==="
          $issueTitle = $env:ISSUE_TITLE
          $issueNumber = $env:ISSUE_NUMBER
          $issueBody = $env:ISSUE_BODY
          "Title: $issueTitle"
          "Number: $issueNumber"
          "Body length: $($issueBody.Length)"
          $content = "# Task #$issueNumber`: $issueTitle`n`n$issueBody"
          $content | Out-File -Encoding UTF8 task.md
          "File written successfully."
          Get-Content task.md
          "=== Save task: SUCCESS ==="
      
      - name: Execute kimi-cli
        shell: powershell
        run: |
          "=== Execute kimi step started ==="
          $kimiCmd = Get-Command kimi -ErrorAction SilentlyContinue
          if (-not $kimiCmd) {
            $possiblePaths = @(
              "$env:USERPROFILE\.local\bin\kimi.exe",
              "$env:APPDATA\Python\Python313\Scripts\kimi.exe",
              "C:\Python313\Scripts\kimi.exe",
              "$env:LOCALAPPDATA\Programs\Python\Python313\Scripts\kimi.exe",
              "C:\Users\owner\AppData\Local\Programs\Python\Python313\Scripts\kimi.exe"
            )
            foreach ($p in $possiblePaths) {
              if (Test-Path $p) {
                $kimiCmd = $p
                "Found kimi at: $p"
                break
              }
            }
          }
          if ($kimiCmd) {
            "Executing kimi..."
            & $kimiCmd --input task.md --output result/
            if ($LASTEXITCODE -ne 0) {
              "kimi exited with code $LASTEXITCODE"
              exit 0
            }
          } else {
            "WARNING: kimi-cli not found. Creating placeholder."
            New-Item -ItemType Directory -Force -Path result | Out-Null
            "Placeholder: kimi-cli was not found" | Out-File -Encoding UTF8 result/placeholder.txt
          }
          "=== Execute kimi: SUCCESS ==="
      
      - name: Commit results
        shell: powershell
        run: |
          "=== Commit step started ==="
          git config user.name "kimi-bot"
          git config user.email "bot@kimi.ai"
          git add -A
          git commit -m "kimi: Execute task #${{ github.event.issue.number }}" 2>&1
          git push 2>&1
          "=== Commit: SUCCESS ==="
      
      - name: Report completion
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const result = '${{ job.status }}';
            const msg = result === 'success' 
              ? '✅ **作業完了！**' 
              : '❌ **作業失敗**\\n\\nRunnerのコンソールログを確認してください。';
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: msg
              });
            } catch (e) {
              console.log('Failed to post comment:', e.message);
            }
